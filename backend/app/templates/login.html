<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      body { background: #0f172a; color: #e2e8f0; }
      .card { background: #111827; border: 1px solid #1f2937; }
      .form-control { background: #0b1220; border-color: #1f2937; color: #e2e8f0; }
      .form-control:focus { background: #0b1220; color: #e2e8f0; }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card p-4">
            <div class="h5 mb-3">Admin Login</div>
            {% if error %}
              <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <form method="post" action="/login">
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input class="form-control" name="username" autocomplete="username" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" name="password" type="password" autocomplete="current-password" required />
              </div>
              <button class="btn btn-primary w-100" type="submit">Login</button>
            </form>
          </div>
          <div class="text-center text-secondary mt-3 small">
            Default: admin / admin
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
